<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fourier Visualizer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="sidebar">
        <h1>Fourier Visualizer</h1>

        <!-- Mode Switcher (always visible) -->
        <div class="mode-switcher">
            <button id="modeDrawBtn" class="mode-btn active">Draw</button>
            <button id="modeFileBtn" class="mode-btn">SVG File</button>
        </div>

        <!-- Draw Mode Panel -->
        <div id="drawPanel">
            <div class="control-group">
                <label>Drawing Tool</label>
                <select id="drawingTool" style="width: 100%; padding: 8px; border-radius: 6px; border: 1px solid #ddd;">
                    <option value="freehand">Freehand</option>
                    <option value="line">Line</option>
                    <option value="rectangle">Rectangle</option>
                    <option value="ellipse">Ellipse</option>
                </select>
            </div>

            <div class="control-group">
                <label>Quick Templates</label>
                <select id="presetSelect" style="width: 100%; padding: 8px; border-radius: 6px; border: 1px solid #ddd; margin-bottom: 8px;">
                    <option value="">-- Select a template --</option>
                    <option value="circle">Circle</option>
                    <option value="square">Square</option>
                    <option value="triangle">Triangle</option>
                    <option value="star">Star (5-point)</option>
                    <option value="heart">Heart</option>
                    <option value="infinity">Infinity Symbol</option>
                    <option value="spiral">Spiral</option>
                    <option value="sine">Sine Wave</option>
                </select>
                <button id="loadPresetBtn" disabled>Load Template</button>
            </div>

            <div class="button-row">
                <button id="undoBtn" disabled>Undo</button>
                <button id="redoBtn" disabled>Redo</button>
            </div>

            <button id="clearBtn" class="secondary">Clear Canvas</button>
        </div>

        <!-- SVG Mode Panel -->
        <div id="svgPanel" class="hidden">
            <div class="control-group">
                <button id="loadSvgBtn" style="width: 100%;">Load SVG File</button>
            </div>
            <p class="hint">Click on a path in the canvas to select it</p>
        </div>

        <!-- Common: Sample Settings (shown when ready to visualize) -->
        <div id="samplePanel" class="hidden">
            <div class="control-group">
                <label>Sample Rate: <span id="sampleValue" class="value-display">10240</span></label>
                <input type="range" id="sampleRate" min="1000" max="20000" value="10240" step="500">
                <p class="hint">Higher rate = smoother curves, more Fourier components</p>
            </div>
        </div>

        <!-- Visualize Button (shown when input is ready) -->
        <div id="visualizeAction" class="hidden">
            <button id="visualizeBtn">Visualize</button>
        </div>

        <!-- Visualization Mode Panel (shown during animation) -->
        <div id="vizPanel" class="hidden">
            <div class="control-group">
                <label>Components</label>
                <div style="display: flex; align-items: center; gap: 8px;">
                    <button id="waveMinus" style="width: 36px; min-width: 36px; margin: 0; padding: 6px; font-size: 18px;">−</button>
                    <input type="number" id="waveInput" min="1" max="500" value="201" style="width: 70px; text-align: center; padding: 6px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px;">
                    <button id="wavePlus" style="width: 36px; min-width: 36px; margin: 0; padding: 6px; font-size: 18px;">+</button>
                </div>
                <input type="range" id="waveCount" min="1" max="500" value="201" step="1" style="margin-top: 8px;">
                <p class="hint">Total: <span id="maxWaveValue">0</span> available</p>
            </div>

            <div class="control-group">
                <label>Speed: <span id="speedValue" class="value-display">1.0x</span></label>
                <input type="range" id="speedControl" min="0.1" max="3.0" value="1.0" step="0.1">
            </div>

            <div class="control-group">
                <label>Timeline</label>
                <input type="range" id="timelineControl" min="0" max="100" value="0" step="0.1">
            </div>

            <div class="control-group">
                <label>Colors</label>
                <div class="button-row">
                    <div style="flex: 1">
                        <label style="font-size: 10px;">Epicycles</label>
                        <input type="color" id="epicycleColor" value="#667eea">
                    </div>
                    <div style="flex: 1">
                        <label style="font-size: 10px;">Trace</label>
                        <input type="color" id="traceColor" value="#333333">
                    </div>
                </div>
            </div>

            <div class="control-group">
                <label>Display</label>
                <label style="display: flex; align-items: center; font-size: 12px; margin: 4px 0;">
                    <input type="checkbox" id="showCircles" checked style="width: auto; margin-right: 8px;">
                    Show Envelope Circles
                </label>
                <label style="display: flex; align-items: center; font-size: 12px; margin: 4px 0;">
                    <input type="checkbox" id="showTrace" checked style="width: auto; margin-right: 8px;">
                    Show Trace
                </label>
                <label style="display: flex; align-items: center; font-size: 12px; margin: 4px 0;">
                    <input type="checkbox" id="showOriginalPath" checked style="width: auto; margin-right: 8px;">
                    Show Original Path
                </label>
            </div>

            <div class="button-row">
                <button id="pauseBtn">Pause</button>
                <button id="resetBtn" class="secondary">Reset</button>
            </div>

            <h2>Export</h2>
            <div class="button-row">
                <button id="exportPngBtn" class="success">PNG</button>
                <button id="exportJsonBtn" class="success">JSON</button>
                <button id="exportGifBtn" class="success">GIF</button>
                <button id="exportHtmlBtn" class="success">HTML</button>
            </div>

            <button id="newDrawBtn" class="danger">New Drawing</button>
        </div>

        <div class="status" id="status">Ready to draw</div>
    </div>

    <div class="main-content">
        <div class="canvas-container">
            <canvas id="fourier_canvas"></canvas>
        </div>
    </div>

<script src="app.js"></script>
<script src="drawing.js"></script>
<script src="visualization.js"></script>
<script src="controls.js"></script>
<script src="export.js"></script>
</body>
</html>
