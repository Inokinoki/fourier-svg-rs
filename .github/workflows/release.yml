name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-cli:
    name: Build CLI on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_name: fourier-cli-linux-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset_name: fourier-cli-windows-x86_64.exe
          - os: macos-latest
            target: x86_64-apple-darwin
            asset_name: fourier-cli-macos-universal

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cli-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Build fourier-cli
        run: cargo build --release --target ${{ matrix.target }} -p fourier-cli

      - name: Strip binary
        if: runner.os != 'Windows'
        run: strip target/${{ matrix.target }}/release/fourier-cli

      - name: Prepare archive
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          if [ "${{ runner.os }}" = "Windows" ]; then
            7z a ../../../${{ matrix.asset_name }}.zip fourier-cli.exe
          else
            tar czf ../../../${{ matrix.asset_name }}.tar.gz fourier-cli
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}.*

  build-tauri:
    name: Build Tauri on ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'linux-x86_64'
            os: 'ubuntu-latest'
            target: 'x86_64-unknown-linux-gnu'
          - platform: 'windows-x86_64'
            os: 'windows-latest'
            target: 'x86_64-pc-windows-msvc'
          - platform: 'macos-universal'
            os: 'macos-latest'
            target: 'x86_64-apple-darwin'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install system dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install system dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install gtk+3

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-tauri-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0"

      - name: Build Tauri bundles
        run: cargo tauri build --features tauri --target ${{ matrix.target }}

      - name: Sign macOS app (ad-hoc)
        if: matrix.os == 'macos-latest'
        run: |
          if [ -d target/${{ matrix.target }}/release/bundle/macos/*.app ]; then
            find target/${{ matrix.target }}/release/bundle/macos -name "*.app" -exec codesign --force --deep --sign - {} \;
          fi

      - name: Collect Linux artifacts
        if: matrix.os == 'ubuntu-latest'
        run: |
          mkdir -p artifacts/${{ matrix.platform }}
          find target/${{ matrix.target }}/release/bundle/appimage -type f -name "*.AppImage" -exec cp {} artifacts/${{ matrix.platform }}/ \;
          find target/${{ matrix.target }}/release/bundle/deb -type f -name "*.deb" -exec cp {} artifacts/${{ matrix.platform }}/ \;

      - name: Collect Windows artifacts
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          mkdir -p artifacts/${{ matrix.platform }}
          find target/${{ matrix.target }}/release/bundle/nsis -type f -name "*.exe" -exec cp {} artifacts/${{ matrix.platform }}/ \;
          find target/${{ matrix.target }}/release/bundle/msi -type f -name "*.msi" -exec cp {} artifacts/${{ matrix.platform }}/ \;

      - name: Collect macOS artifacts
        if: matrix.os == 'macos-latest'
        run: |
          mkdir -p artifacts/${{ matrix.platform }}
          if [ -f target/${{ matrix.target }}/release/bundle/dmg/*.dmg ]; then
            cp target/${{ matrix.target }}/release/bundle/dmg/*.dmg artifacts/${{ matrix.platform }}/
          fi
          if [ -d target/${{ matrix.target }}/release/bundle/macos/*.app ]; then
            cd target/${{ matrix.target }}/release/bundle/macos
            tar czf ../../../../../artifacts/${{ matrix.platform }}/app-bundle.tar.gz *.app
          fi

      - name: Upload Tauri artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tauri-${{ matrix.platform }}
          path: artifacts

  release:
    name: Create Release
    needs: [build-cli, build-tauri]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure
        run: ls -R artifacts

      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/*/*
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
