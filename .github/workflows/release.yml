name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  # Build CLI tools (fourier-cli, gpui-app) for multiple platforms
  build-cli:
    name: Build CLI on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name_cli: fourier-cli
            artifact_name_gpui: gpui-app
            asset_name: fourier-cli-linux-x86_64
            asset_name_gpui: gpui-app-linux-x86_64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact_name_cli: fourier-cli
            artifact_name_gpui: gpui-app
            asset_name: fourier-cli-linux-aarch64
            asset_name_gpui: gpui-app-linux-aarch64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name_cli: fourier-cli.exe
            artifact_name_gpui: gpui-app.exe
            asset_name: fourier-cli-windows-x86_64.exe
            asset_name_gpui: gpui-app-windows-x86_64.exe
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name_cli: fourier-cli
            artifact_name_gpui: gpui-app
            asset_name: fourier-cli-macos-x86_64
            asset_name_gpui: gpui-app-macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name_cli: fourier-cli
            artifact_name_gpui: gpui-app
            asset_name: fourier-cli-macos-aarch64
            asset_name_gpui: gpui-app-macos-aarch64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.os == 'ubuntu-latest' && matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Build fourier-cli release binary
        run: cargo build --release --target ${{ matrix.target }} -p fourier-cli

      - name: Build gpui-app release binary
        run: cargo build --release --target ${{ matrix.target }} -p gpui-app

      - name: Strip binary (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          strip target/${{ matrix.target }}/release/${{ matrix.artifact_name_cli }}
          strip target/${{ matrix.target }}/release/${{ matrix.artifact_name_gpui }}

      - name: Strip binary (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          strip target/${{ matrix.target }}/release/${{ matrix.artifact_name_cli }}
          strip target/${{ matrix.target }}/release/${{ matrix.artifact_name_gpui }}

      - name: Prepare fourier-cli archive
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          if [ "${{ runner.os }}" = "Windows" ]; then
            7z a ../../../${{ matrix.asset_name }}.zip ${{ matrix.artifact_name_cli }}
          else
            tar czf ../../../${{ matrix.asset_name }}.tar.gz ${{ matrix.artifact_name_cli }}
          fi
          cd ../../..

      - name: Prepare gpui-app archive
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          if [ "${{ runner.os }}" = "Windows" ]; then
            7z a ../../../${{ matrix.asset_name_gpui }}.zip ${{ matrix.artifact_name_gpui }}
          else
            tar czf ../../../${{ matrix.asset_name_gpui }}.tar.gz ${{ matrix.artifact_name_gpui }}
          fi
          cd ../../..

      - name: Upload fourier-cli artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}.*

      - name: Upload gpui-app artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name_gpui }}
          path: ${{ matrix.asset_name_gpui }}.*

  # Build Tauri desktop app for multiple platforms
  build-tauri:
    name: Build Tauri on ${{ matrix.platform }}
    needs: build-cli
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'linux-x86_64'
            os: 'ubuntu-latest'
            target: 'x86_64-unknown-linux-gnu'
          - platform: 'linux-aarch64'
            os: 'ubuntu-latest'
            target: 'aarch64-unknown-linux-gnu'
          - platform: 'windows-x86_64'
            os: 'windows-latest'
            target: 'x86_64-pc-windows-msvc'
          - platform: 'macos-x86_64'
            os: 'macos-latest'
            target: 'x86_64-apple-darwin'
          - platform: 'macos-aarch64'
            os: 'macos-latest'
            target: 'aarch64-apple-darwin'

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install system dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install system dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          brew install gtk+3

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.os == 'ubuntu-latest' && matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-build-tauri-${{ hashFiles('**/Cargo.lock') }}

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tauriScript: cargo build --features tauri
          args: --target ${{ matrix.target }}

  release:
    name: Create Release
    needs: [build-cli, build-tauri]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -R artifacts

      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/*/*
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-docker:
    name: Build Docker image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: startsWith(github.ref, 'refs/tags/v')
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/fourier-svg
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ startsWith(github.ref, 'refs/tags/v') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
